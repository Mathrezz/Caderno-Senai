<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    
    
div {
  width: 900px;
  height: 600px;
  background-color: #ce1126; 
  position: relative;
  margin: 0;
}

div > div {
  width: 900px;
  height: 300px;
  background-color: #002868; 
  position: absolute;
  top: 150px;
}

div > div > div {
  width: 200px;
  height: 200px;
  background-color: #ffffff; 
  border-radius: 50%;
  position: relative;
  top: 50px;
  left: 350px;
}

p {
  color: #000000; 
  text-align: center;
  font-size: 24px;
  margin: 0;
  position: relative;
  top: 85px;
}
  </style>
</head>

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
